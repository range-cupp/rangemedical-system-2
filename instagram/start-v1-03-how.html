<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Start Carousel 03 — How It Works</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { width:1080px; height:1080px; overflow:hidden; background:#0A0A0A; font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased; }
  .slide { width:1080px; height:1080px; position:relative; background:#0A0A0A; }
  .slide::before { content:''; position:absolute; inset:0; background-image:radial-gradient(circle,rgba(255,255,255,0.045) 1px,transparent 1px); background-size:40px 40px; pointer-events:none; }

  .top-bar { position:absolute; top:72px; left:108px; right:108px; display:flex; justify-content:space-between; align-items:center; z-index:2; }
  .brand { font-size:20px; font-weight:700; letter-spacing:0.02em; color:rgba(255,255,255,0.5); }
  .slide-num { font-size:18px; font-weight:500; color:rgba(255,255,255,0.28); }

  .section-tag { position:absolute; top:130px; left:108px; font-size:18px; font-weight:700; letter-spacing:0.22em; text-transform:uppercase; color:rgba(255,255,255,0.28); z-index:2; }
  .section-rule { position:absolute; top:162px; left:108px; right:108px; height:1px; background:rgba(255,255,255,0.1); z-index:2; }

  .headline-block { position:absolute; top:196px; left:108px; right:108px; z-index:2; }
  .headline { font-size:90px; font-weight:800; letter-spacing:-4px; line-height:0.93; color:#FFFFFF; margin-bottom:14px; }
  .sub { font-size:34px; font-weight:400; color:rgba(255,255,255,0.38); line-height:1.5; margin-top:16px; }

  .step { position:absolute; left:108px; right:108px; z-index:2; }
  .step-rule { width:100%; height:1px; background:rgba(255,255,255,0.1); margin-bottom:24px; }
  .step-inner { display:flex; align-items:flex-start; gap:40px; }
  .step-num { font-size:18px; font-weight:700; letter-spacing:0.2em; color:rgba(255,255,255,0.2); width:32px; flex-shrink:0; padding-top:8px; }
  .step-content { flex:1; }
  .step-name { font-size:40px; font-weight:700; letter-spacing:-1px; line-height:1.2; color:rgba(255,255,255,0.4); margin-bottom:6px; }
  .step-val { font-size:48px; font-weight:800; letter-spacing:-2px; line-height:1.1; color:#FFFFFF; }

  .step-1 { top:424px; }
  .step-2 { top:616px; }
  .step-3 { top:808px; }

  .bottom-bar { position:absolute; bottom:60px; left:108px; right:108px; display:flex; justify-content:flex-end; border-top:1px solid rgba(255,255,255,0.08); padding-top:18px; z-index:2; }
  .next { font-size:20px; font-weight:600; letter-spacing:0.07em; text-transform:uppercase; color:rgba(255,255,255,0.28); }
</style>
</head>
<body>
<div class="slide">
  <div class="top-bar">
    <span class="brand">@range_medical</span>
    <span class="slide-num">03 / 07</span>
  </div>
  <div class="section-tag">How It Works</div>
  <div class="section-rule"></div>

  <div class="headline-block">
    <div class="headline">Three steps.</div>
    <div class="sub">That&#8217;s all it takes to get started.</div>
  </div>

  <div class="step step-1">
    <div class="step-rule"></div>
    <div class="step-inner">
      <div class="step-num">01</div>
      <div class="step-content">
        <div class="step-name">Go to</div>
        <div class="step-val">range-medical.com/start</div>
      </div>
    </div>
  </div>

  <div class="step step-2">
    <div class="step-rule"></div>
    <div class="step-inner">
      <div class="step-num">02</div>
      <div class="step-content">
        <div class="step-name">Watch</div>
        <div class="step-val">A short video from our head janitor</div>
      </div>
    </div>
  </div>

  <div class="step step-3">
    <div class="step-rule"></div>
    <div class="step-inner">
      <div class="step-num">03</div>
      <div class="step-content">
        <div class="step-name">Pick</div>
        <div class="step-val">The path that fits you</div>
      </div>
    </div>
  </div>

  <div class="bottom-bar">
    <span class="next">The Two Paths &#8594;</span>
  </div>
</div>
</body>
</html>
