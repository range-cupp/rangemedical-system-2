<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Range Medical — Business Card</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a1a;
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 60px;
    padding: 60px 20px;
  }

  .label {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
    margin-bottom: -40px;
  }

  /* Standard business card: 3.5 x 2 inches at 300dpi = 1050 x 600 */
  /* Scaled 0.6x for browser preview — print at native 1050x600 */
  .card {
    width: 1050px;
    height: 600px;
    border-radius: 12px;
    position: relative;
    overflow: hidden;
    transform: scale(0.6);
    transform-origin: top center;
    margin-bottom: -240px;
  }

  /* ── FRONT ────────────────────────────────────────── */
  .front {
    background: #FFFFFF;
  }

  .front .content {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 64px;
    gap: 24px;
  }

  .front .top-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }

  .front .name {
    font-size: 44px;
    font-weight: 800;
    letter-spacing: -0.03em;
    color: #0A0A0A;
    line-height: 1;
  }
  .front .title-role {
    font-size: 16px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #999999;
  }

  .front .divider {
    width: 100%;
    height: 1px;
    background: #E0E0E0;
  }

  .front .phone {
    font-size: 38px;
    font-weight: 700;
    letter-spacing: -0.01em;
    color: #0A0A0A;
    line-height: 1;
  }

  .front .details-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .front .detail-text {
    font-size: 15px;
    font-weight: 400;
    color: #666666;
    letter-spacing: 0.01em;
  }
  .front .brand-name {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #0A0A0A;
  }

  /* ── BACK ─────────────────────────────────────────── */
  .back {
    background: #0A0A0A;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .back .grid-overlay {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
  }

  .back .corner-marks {
    position: absolute;
    inset: 28px;
    pointer-events: none;
  }
  .back .corner-marks::before,
  .back .corner-marks::after {
    content: '';
    position: absolute;
    width: 20px;
    height: 20px;
  }
  .back .corner-marks::before {
    top: 0; left: 0;
    border-top: 1px solid rgba(255,255,255,0.12);
    border-left: 1px solid rgba(255,255,255,0.12);
  }
  .back .corner-marks::after {
    bottom: 0; right: 0;
    border-bottom: 1px solid rgba(255,255,255,0.12);
    border-right: 1px solid rgba(255,255,255,0.12);
  }

  .back .center-content {
    position: relative;
    z-index: 2;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  .back .logo-text {
    font-size: 42px;
    font-weight: 800;
    letter-spacing: -0.01em;
    color: #FFFFFF;
    line-height: 1;
  }

  .back .logo-rule {
    width: 40px;
    height: 1px;
    background: rgba(255,255,255,0.2);
    margin: 18px 0;
  }

  .back .tagline {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
  }

  .back .bottom-url {
    position: absolute;
    bottom: 36px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 0.12em;
    color: rgba(255,255,255,0.2);
    z-index: 2;
  }

  /* ── PRINT GUIDE ──────────────────────────────────── */
  .specs {
    font-size: 11px;
    font-weight: 400;
    color: rgba(255,255,255,0.25);
    text-align: center;
    line-height: 1.8;
    margin-top: -20px;
  }
</style>
</head>
<body>

<p class="label">Front</p>

<!-- ── FRONT ──────────────────────────────────────────── -->
<div class="card front">
  <div class="content">
    <div class="top-row">
      <div class="name">Chris Cupp</div>
      <div class="title-role">Founder</div>
    </div>
    <div class="divider"></div>
    <div class="phone">(949) 539-5023</div>
    <div class="details-row">
      <span class="detail-text">1901 Westcliff Dr, Ste 10, Newport Beach, CA</span>
      <span class="detail-text">range-medical.com</span>
    </div>
    <div class="details-row">
      <span class="brand-name">Range Medical</span>
      <span class="detail-text">Regenerative Medicine</span>
    </div>
  </div>
</div>

<p class="label">Back</p>

<!-- ── BACK ───────────────────────────────────────────── -->
<div class="card back">
  <div class="grid-overlay"></div>
  <div class="corner-marks"></div>
  <div class="center-content">
    <div class="logo-text">Range Medical</div>
    <div class="logo-rule"></div>
    <div class="tagline">Regenerative Medicine</div>
  </div>
  <div class="bottom-url">range-medical.com</div>
</div>

<p class="specs">
  Standard business card &mdash; 3.5 &times; 2 in @ 300 dpi (1050 &times; 600 px)<br/>
  Add 0.125 in bleed for print
</p>

</body>
</html>
