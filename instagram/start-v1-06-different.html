<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Start Carousel 06 — What Makes Range Different</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { width:1080px; height:1080px; overflow:hidden; background:#F5F4F0; font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased; }
  .slide { width:1080px; height:1080px; position:relative; background:#F5F4F0; }

  .top-bar { position:absolute; top:72px; left:108px; right:108px; display:flex; justify-content:space-between; align-items:center; z-index:2; }
  .brand { font-size:20px; font-weight:700; letter-spacing:0.02em; color:rgba(0,0,0,0.38); }
  .slide-num { font-size:18px; font-weight:500; color:rgba(0,0,0,0.22); }

  .section-tag { position:absolute; top:130px; left:108px; font-size:18px; font-weight:700; letter-spacing:0.22em; text-transform:uppercase; color:rgba(0,0,0,0.3); z-index:2; }
  .section-rule { position:absolute; top:162px; left:108px; right:108px; height:1px; background:rgba(0,0,0,0.1); z-index:2; }

  .headline-block { position:absolute; top:196px; left:108px; right:108px; z-index:2; }
  .headline { font-size:88px; font-weight:800; letter-spacing:-4px; line-height:0.93; color:#0A0A0A; }
  .headline-light { font-size:88px; font-weight:300; letter-spacing:-4px; line-height:0.93; color:rgba(0,0,0,0.3); margin-bottom:52px; }
  .rule { width:56px; height:2px; background:rgba(0,0,0,0.2); margin-bottom:52px; }

  .checks { position:absolute; top:510px; left:108px; right:108px; z-index:2; }
  .check-item { display:flex; gap:28px; align-items:flex-start; margin-bottom:36px; }
  .check-mark { font-size:44px; font-weight:800; color:#2E6B35; line-height:1.2; flex-shrink:0; width:44px; }
  .check-text { font-size:46px; font-weight:500; letter-spacing:-1px; line-height:1.2; color:#0A0A0A; }

  .bottom-bar { position:absolute; bottom:60px; left:108px; right:108px; display:flex; justify-content:flex-end; border-top:1px solid rgba(0,0,0,0.08); padding-top:18px; z-index:2; }
  .next { font-size:20px; font-weight:600; letter-spacing:0.07em; text-transform:uppercase; color:rgba(0,0,0,0.28); }
</style>
</head>
<body>
<div class="slide">
  <div class="top-bar">
    <span class="brand">@range_medical</span>
    <span class="slide-num">06 / 07</span>
  </div>
  <div class="section-tag">Why Range</div>
  <div class="section-rule"></div>

  <div class="headline-block">
    <div class="headline">We don&#8217;t guess.</div>
    <div class="headline-light">We don&#8217;t rush.</div>
    <div class="rule"></div>
  </div>

  <div class="checks">
    <div class="check-item"><div class="check-mark">&#10003;</div><div class="check-text">Real labs tied to how you actually feel</div></div>
    <div class="check-item"><div class="check-mark">&#10003;</div><div class="check-text">Written plan you can follow</div></div>
    <div class="check-item"><div class="check-mark">&#10003;</div><div class="check-text">One provider who knows your case</div></div>
    <div class="check-item"><div class="check-mark">&#10003;</div><div class="check-text">Newport Beach &amp; San Clemente</div></div>
  </div>

  <div class="bottom-bar">
    <span class="next">How to Start &#8594;</span>
  </div>
</div>
</body>
</html>
