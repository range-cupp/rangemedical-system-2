<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Start Carousel 05 — Energy Path</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { width:1080px; height:1080px; overflow:hidden; background:#0A0A0A; font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased; }
  .slide { width:1080px; height:1080px; position:relative; background:#0A0A0A; }
  .slide::before { content:''; position:absolute; inset:0; background-image:radial-gradient(circle,rgba(255,255,255,0.045) 1px,transparent 1px); background-size:40px 40px; pointer-events:none; }

  .top-bar { position:absolute; top:72px; left:108px; right:108px; display:flex; justify-content:space-between; align-items:center; z-index:2; }
  .brand { font-size:20px; font-weight:700; letter-spacing:0.02em; color:rgba(255,255,255,0.5); }
  .slide-num { font-size:18px; font-weight:500; color:rgba(255,255,255,0.28); }

  .section-tag { position:absolute; top:130px; left:108px; font-size:18px; font-weight:700; letter-spacing:0.22em; text-transform:uppercase; color:rgba(255,255,255,0.28); z-index:2; }
  .section-rule { position:absolute; top:162px; left:108px; right:108px; height:1px; background:rgba(255,255,255,0.1); z-index:2; }

  .headline-block { position:absolute; top:192px; left:108px; right:108px; z-index:2; }
  .headline { font-size:72px; font-weight:800; letter-spacing:-3px; line-height:1.0; color:#FFFFFF; margin-bottom:10px; }

  .items-block { position:absolute; top:388px; left:108px; right:108px; z-index:2; }
  .item { display:flex; gap:28px; align-items:flex-start; margin-bottom:36px; }
  .item-arrow { font-size:36px; font-weight:300; color:rgba(255,255,255,0.2); line-height:1.3; flex-shrink:0; }
  .item-text { font-size:44px; font-weight:600; letter-spacing:-1.5px; line-height:1.2; color:#FFFFFF; }
  .item-text.dim { color:rgba(255,255,255,0.4); font-weight:400; }

  .note { position:absolute; bottom:130px; left:108px; right:108px; z-index:2; border-top:1px solid rgba(255,255,255,0.1); padding-top:22px; }
  .note-text { font-size:30px; font-weight:400; color:rgba(255,255,255,0.35); line-height:1.5; }

  .bottom-bar { position:absolute; bottom:60px; left:108px; right:108px; display:flex; justify-content:flex-end; border-top:1px solid rgba(255,255,255,0.08); padding-top:18px; z-index:2; }
  .next { font-size:20px; font-weight:600; letter-spacing:0.07em; text-transform:uppercase; color:rgba(255,255,255,0.28); }
</style>
</head>
<body>
<div class="slide">
  <div class="top-bar">
    <span class="brand">@range_medical</span>
    <span class="slide-num">05 / 07</span>
  </div>
  <div class="section-tag">Energy Path</div>
  <div class="section-rule"></div>

  <div class="headline-block">
    <div class="headline">Tired, foggy,<br/>gaining weight?</div>
  </div>

  <div class="items-block">
    <div class="item"><div class="item-arrow">&#8594;</div><div class="item-text">Pick your lab panel<span class="dim"> (Essential or Elite)</span></div></div>
    <div class="item"><div class="item-arrow">&#8594;</div><div class="item-text dim">Get your blood drawn</div></div>
    <div class="item"><div class="item-arrow">&#8594;</div><div class="item-text">1:1 provider review</div></div>
    <div class="item"><div class="item-arrow">&#8594;</div><div class="item-text dim">Written plan in plain language</div></div>
  </div>

  <div class="note">
    <div class="note-text">Both panels include labs + provider visit + your written plan.</div>
  </div>

  <div class="bottom-bar">
    <span class="next">What Makes Range Different &#8594;</span>
  </div>
</div>
</body>
</html>
