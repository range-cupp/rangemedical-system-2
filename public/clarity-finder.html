<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clarity Finder | Range Medical</title>
  <link rel="icon" href="/favicon.ico">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #f5f7f8;
      color: #1a1a1a;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .quiz-wrap {
      max-width: 620px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }

    /* ── Header ── */
    .quiz-brand {
      text-align: center;
      padding: 8px 0 20px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2.5px;
      color: #1B6B5A;
      text-transform: uppercase;
    }

    /* ── Card ── */
    .quiz-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 32px 28px;
    }

    /* ── Progress ── */
    .progress-wrap { margin-bottom: 28px; }
    .progress-label {
      font-size: 13px;
      color: #888;
      margin-bottom: 8px;
    }
    .progress-track {
      height: 4px;
      background: #e8ecee;
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: #1B6B5A;
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    /* ── Back button ── */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: none;
      border: none;
      color: #888;
      font-size: 14px;
      cursor: pointer;
      padding: 0;
      margin-bottom: 20px;
    }
    .back-btn:hover { color: #555; }
    .back-btn svg { width: 16px; height: 16px; }

    /* ── Intro ── */
    .intro-headline {
      font-size: 26px;
      font-weight: 700;
      line-height: 1.25;
      color: #1a1a1a;
      margin-bottom: 12px;
    }
    .intro-subhead {
      font-size: 16px;
      line-height: 1.55;
      color: #555;
      margin-bottom: 32px;
    }

    /* ── Question ── */
    .question-text {
      font-size: 20px;
      font-weight: 600;
      line-height: 1.35;
      margin-bottom: 24px;
    }

    /* ── Choice buttons ── */
    .option-btn {
      display: block;
      width: 100%;
      text-align: left;
      background: #fff;
      border: 1.5px solid #dde1e4;
      border-radius: 10px;
      padding: 16px 18px;
      font-size: 16px;
      line-height: 1.4;
      color: #1a1a1a;
      cursor: pointer;
      margin-bottom: 10px;
      transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
    }
    .option-btn:hover {
      border-color: #1B6B5A;
      background: #f5fbf9;
    }
    .option-btn.selected {
      border-color: #1B6B5A;
      background: #edf7f4;
      box-shadow: 0 0 0 1px #1B6B5A;
    }

    /* ── Scale buttons ── */
    .scale-labels {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #999;
      margin-bottom: 10px;
      padding: 0 2px;
    }
    .scale-row {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 6px;
    }
    .scale-btn {
      height: 48px;
      border: 1.5px solid #dde1e4;
      border-radius: 10px;
      background: #fff;
      font-size: 17px;
      font-weight: 600;
      color: #1a1a1a;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .scale-btn:hover {
      border-color: #1B6B5A;
      background: #f5fbf9;
    }
    .scale-btn.selected {
      border-color: #1B6B5A;
      background: #1B6B5A;
      color: #fff;
      box-shadow: 0 0 0 1px #1B6B5A;
    }

    /* ── Form ── */
    .form-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .form-subtitle {
      font-size: 15px;
      color: #777;
      margin-bottom: 24px;
      line-height: 1.45;
    }
    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 6px;
      color: #333;
    }
    .form-input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #dde1e4;
      border-radius: 8px;
      font-size: 16px;
      color: #1a1a1a;
      outline: none;
      transition: border-color 0.15s;
    }
    .form-input:focus { border-color: #1B6B5A; }
    .form-input.error { border-color: #d32f2f; }
    .form-error {
      font-size: 13px;
      color: #d32f2f;
      margin-top: 4px;
      display: none;
    }
    .form-error.show { display: block; }
    .consent-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin: 24px 0 28px;
    }
    .consent-row input[type="checkbox"] {
      width: 18px;
      height: 18px;
      margin-top: 2px;
      flex-shrink: 0;
      accent-color: #1B6B5A;
    }
    .consent-row label {
      font-size: 14px;
      line-height: 1.45;
      color: #555;
      cursor: pointer;
    }

    /* ── Buttons ── */
    .btn-primary {
      display: block;
      width: 100%;
      padding: 16px 24px;
      background: #1B6B5A;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      text-align: center;
      text-decoration: none;
    }
    .btn-primary:hover { background: #155649; }
    .btn-primary:disabled {
      background: #b0c4bc;
      cursor: not-allowed;
    }

    /* ── Results ── */
    .results-badge {
      display: inline-block;
      background: #edf7f4;
      color: #1B6B5A;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 6px 14px;
      border-radius: 6px;
      margin-bottom: 16px;
    }
    .results-title {
      font-size: 24px;
      font-weight: 700;
      line-height: 1.25;
      margin-bottom: 24px;
    }
    .results-text {
      font-size: 16px;
      line-height: 1.65;
      color: #333;
      margin-bottom: 18px;
    }
    .urgency-box {
      background: #fffbf0;
      border-left: 3px solid #d4a017;
      padding: 16px 18px;
      border-radius: 0 8px 8px 0;
      margin: 24px 0;
      font-size: 15px;
      line-height: 1.55;
      color: #5a4600;
    }
    .cta-section { margin-top: 32px; }
    .cta-link {
      display: block;
      width: 100%;
      padding: 18px 24px;
      background: #1B6B5A;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      transition: background 0.15s;
    }
    .cta-link:hover { background: #155649; }
    .cta-secondary {
      text-align: center;
      font-size: 14px;
      color: #777;
      margin-top: 14px;
      line-height: 1.45;
    }
    .range-st-note {
      background: #f0f7ff;
      border-left: 3px solid #3b7dd8;
      padding: 16px 18px;
      border-radius: 0 8px 8px 0;
      font-size: 15px;
      line-height: 1.55;
      color: #1a3a5c;
      margin-top: 16px;
    }
    .both-note {
      background: #f5f5f5;
      border-radius: 8px;
      padding: 16px 18px;
      font-size: 14px;
      line-height: 1.55;
      color: #555;
      margin-top: 24px;
    }
    .restart-link {
      display: block;
      text-align: center;
      margin-top: 28px;
      font-size: 14px;
      color: #999;
      cursor: pointer;
      background: none;
      border: none;
      text-decoration: underline;
    }
    .restart-link:hover { color: #666; }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .quiz-card { padding: 24px 20px; }
      .intro-headline { font-size: 22px; }
      .question-text { font-size: 18px; }
      .scale-btn { height: 42px; font-size: 15px; }
      .scale-row { gap: 4px; }
      .results-title { font-size: 21px; }
    }
  </style>
</head>
<body>
  <div class="quiz-wrap">
    <div class="quiz-brand">Range Medical</div>
    <div class="quiz-card" id="app"></div>
  </div>

  <script>
  /* ═══════════════════════════════════════════════════════════════════
     CONFIGURATION — edit questions, labels, and URLs here
     ═══════════════════════════════════════════════════════════════════ */
  var QUIZ = {
    urls: {
      assessmentBooking: '/book-assessment'
    },

    pathQuestion: {
      text: 'What are you here for today?',
      options: [
        { value: 'energy', label: 'Low energy, brain fog, or not feeling like myself' },
        { value: 'injury', label: 'Slow recovery from an injury or pain that will not calm down' },
        { value: 'both', label: 'Both' }
      ]
    },

    energy: [
      {
        key: 'main_issue',
        text: 'What is bothering you most right now?',
        type: 'choice',
        options: [
          { value: 'low_energy', label: 'Low energy or afternoon crashes', resultLabel: 'low energy or afternoon crashes' },
          { value: 'brain_fog', label: 'Brain fog or trouble focusing', resultLabel: 'brain fog or trouble focusing' },
          { value: 'weight', label: 'Hard time losing weight', resultLabel: 'a hard time losing weight' },
          { value: 'mood', label: 'Mood, sleep, or stress', resultLabel: 'mood, sleep, or stress' },
          { value: 'mix', label: 'A mix of all of these', resultLabel: 'a mix of energy, focus, weight, and mood issues' }
        ]
      },
      {
        key: 'duration',
        text: 'How long has this been going on?',
        type: 'choice',
        options: [
          { value: 'lt3mo', label: 'Less than 3 months', resultLabel: 'less than 3 months' },
          { value: '3to12mo', label: '3–12 months', resultLabel: '3 to 12 months' },
          { value: 'gt1yr', label: 'More than a year', resultLabel: 'more than a year' }
        ]
      },
      {
        key: 'energy_score',
        text: 'On most days, how would you rate your energy from 1–10?',
        type: 'scale',
        min: 1,
        max: 10,
        lowLabel: 'Low',
        highLabel: 'High'
      },
      {
        key: 'has_labs',
        text: 'Have you had blood work or labs checked in the last 12 months?',
        type: 'choice',
        options: [
          { value: 'fine', label: 'Yes, and I was told things were “fine”', resultLabel: 'told your labs are fine' },
          { value: 'off', label: 'Yes, and I was told some things were off', resultLabel: 'told some things were off' },
          { value: 'no', label: 'No, or I am not sure', resultLabel: "haven't had recent labs" }
        ]
      },
      {
        key: 'urgency_score',
        text: 'How important is it to fix this in the next 90 days?',
        type: 'scale',
        min: 1,
        max: 10,
        lowLabel: 'Not urgent',
        highLabel: 'Very important'
      }
    ],

    injury: [
      {
        key: 'body_area',
        text: 'Where do you hurt the most right now?',
        type: 'choice',
        options: [
          { value: 'shoulder_arm', label: 'Shoulder or arm', resultLabel: 'shoulder or arm' },
          { value: 'back_neck', label: 'Back or neck', resultLabel: 'back or neck' },
          { value: 'hip_knee', label: 'Hip or knee', resultLabel: 'hip or knee' },
          { value: 'foot_ankle', label: 'Foot or ankle', resultLabel: 'foot or ankle' },
          { value: 'other', label: 'Other', resultLabel: 'body' }
        ]
      },
      {
        key: 'chronicity',
        text: 'How long has this injury or pain been going on?',
        type: 'choice',
        options: [
          { value: 'lt6wk', label: 'Less than 6 weeks', resultLabel: 'less than 6 weeks' },
          { value: '6to12wk', label: '6–12 weeks', resultLabel: '6 to 12 weeks' },
          { value: 'gt3mo', label: 'More than 3 months', resultLabel: 'more than 3 months' }
        ]
      },
      {
        key: 'pain_type',
        text: 'What best describes how it feels?',
        type: 'choice',
        options: [
          { value: 'sharp', label: 'Sharp or stabbing' },
          { value: 'dull', label: 'Dull or aching' },
          { value: 'tight', label: 'Tight or stiff' },
          { value: 'burning', label: 'Burning or tingling' }
        ]
      },
      {
        key: 'current_provider',
        text: 'Are you currently working with a chiropractor or physical therapist?',
        type: 'choice',
        options: [
          { value: 'range_st', label: 'Yes, at Range Sports Therapy' },
          { value: 'elsewhere', label: 'Yes, somewhere else' },
          { value: 'no', label: 'No, not right now' }
        ]
      },
      {
        key: 'recovery_feeling',
        text: 'How does your recovery feel so far?',
        type: 'choice',
        options: [
          { value: 'faster', label: 'Faster than I expected', resultLabel: 'faster than expected' },
          { value: 'expected', label: 'About what I expected', resultLabel: 'about what you expected' },
          { value: 'slower', label: 'Slower than I hoped', resultLabel: 'slower than you hoped' }
        ]
      },
      {
        key: 'urgency_score',
        text: 'How important is it to speed up your recovery in the next 60 days?',
        type: 'scale',
        min: 1,
        max: 10,
        lowLabel: 'Not urgent',
        highLabel: 'Very important'
      }
    ]
  };

  /* ═══════════════════════════════════════════════════════════════════
     STATE
     ═══════════════════════════════════════════════════════════════════ */
  var state = {
    screen: 'intro',
    path: null,
    pathChoice: null,
    qIndex: 0,
    answers: {},
    lead: { firstName: '', email: '', mobile: '' },
    consent: false
  };

  var app = document.getElementById('app');

  /* ═══════════════════════════════════════════════════════════════════
     HELPERS
     ═══════════════════════════════════════════════════════════════════ */
  function questions() { return QUIZ[state.path] || []; }
  function totalQ() { return questions().length; }

  function getResultLabel(questionKey, answerValue) {
    var qs = questions();
    for (var i = 0; i < qs.length; i++) {
      if (qs[i].key === questionKey && qs[i].options) {
        for (var j = 0; j < qs[i].options.length; j++) {
          if (qs[i].options[j].value === answerValue) {
            return qs[i].options[j].resultLabel || qs[i].options[j].label;
          }
        }
      }
    }
    return answerValue;
  }

  function esc(str) {
    var d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  function formatPhone(val) {
    var digits = val.replace(/\D/g, '').slice(0, 10);
    if (digits.length === 0) return '';
    if (digits.length <= 3) return '(' + digits;
    if (digits.length <= 6) return '(' + digits.slice(0, 3) + ') ' + digits.slice(3);
    return '(' + digits.slice(0, 3) + ') ' + digits.slice(3, 6) + '-' + digits.slice(6);
  }

  function phoneDigits(val) { return val.replace(/\D/g, ''); }

  function validEmail(e) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e); }

  function aOrAn(n) { return (n === 8 || n === 11 || n === 18) ? 'an' : 'a'; }

  function transition(renderFn) {
    renderFn();
    window.scrollTo(0, 0);
  }

  var backArrow = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>';

  /* ═══════════════════════════════════════════════════════════════════
     LEAD SUBMISSION (wire to your API)
     ═══════════════════════════════════════════════════════════════════ */
  function submitLead(data) {
    fetch('/api/quiz/submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        firstName: data.lead.firstName,
        email: data.lead.email,
        phone: phoneDigits(data.lead.mobile || ''),
        path: data.path,
        answers: {
          pathChoice: data.pathChoice,
          responses: data.answers
        }
      })
    }).catch(function(err) { console.error('Lead submit error:', err); });
  }

  /* ═══════════════════════════════════════════════════════════════════
     RENDER: LANDING
     ═══════════════════════════════════════════════════════════════════ */
  function renderLanding() {
    state.screen = 'landing';
    var h = '';
    h += '<h1 class="intro-headline">3‑Minute Clarity Finder: Why You Don’t Feel Like Yourself</h1>';
    h += '<p class="intro-subhead">Answer a few simple questions. We’ll show you which path fits you best and what to do next.</p>';
    h += '<button class="btn-primary" id="start-quiz">Take the Quiz</button>';
    app.innerHTML = h;

    document.getElementById('start-quiz').addEventListener('click', function() {
      transition(renderPathQuestion);
    });
  }

  /* ═══════════════════════════════════════════════════════════════════
     RENDER: PATH QUESTION
     ═══════════════════════════════════════════════════════════════════ */
  function renderPathQuestion() {
    state.screen = 'intro';
    var h = '';
    h += '<p class="question-text">' + esc(QUIZ.pathQuestion.text) + '</p>';
    for (var i = 0; i < QUIZ.pathQuestion.options.length; i++) {
      var o = QUIZ.pathQuestion.options[i];
      h += '<button class="option-btn" data-value="' + o.value + '">' + esc(o.label) + '</button>';
    }
    app.innerHTML = h;

    var btns = app.querySelectorAll('.option-btn');
    for (var j = 0; j < btns.length; j++) {
      btns[j].addEventListener('click', function() {
        var val = this.getAttribute('data-value');
        state.pathChoice = val;
        state.path = (val === 'injury') ? 'injury' : 'energy';
        state.qIndex = 0;
        state.answers = {};
        transition(renderQuestion);
      });
    }
  }

  /* ═══════════════════════════════════════════════════════════════════
     RENDER: QUESTION
     ═══════════════════════════════════════════════════════════════════ */
  function renderQuestion() {
    var qs = questions();
    var q = qs[state.qIndex];
    state.screen = 'question';
    var h = '';

    // Progress
    var pct = Math.round(((state.qIndex) / totalQ()) * 100);
    h += '<div class="progress-wrap">';
    h += '<div class="progress-label">Question ' + (state.qIndex + 1) + ' of ' + totalQ() + '</div>';
    h += '<div class="progress-track"><div class="progress-fill" style="width:' + pct + '%"></div></div>';
    h += '</div>';

    // Back
    h += '<button class="back-btn" id="back">' + backArrow + ' Back</button>';

    // Question text
    h += '<p class="question-text">' + esc(q.text) + '</p>';

    if (q.type === 'choice') {
      for (var i = 0; i < q.options.length; i++) {
        var o = q.options[i];
        h += '<button class="option-btn" data-value="' + o.value + '">' + esc(o.label) + '</button>';
      }
    } else if (q.type === 'scale') {
      h += '<div class="scale-labels"><span>' + esc(q.lowLabel) + '</span><span>' + esc(q.highLabel) + '</span></div>';
      h += '<div class="scale-row">';
      for (var s = q.min; s <= q.max; s++) {
        h += '<button class="scale-btn" data-value="' + s + '">' + s + '</button>';
      }
      h += '</div>';
    }

    app.innerHTML = h;

    // Back handler
    document.getElementById('back').addEventListener('click', function() {
      if (state.qIndex > 0) {
        state.qIndex--;
        transition(renderQuestion);
      } else {
        transition(renderPathQuestion);
      }
    });

    // Option handlers
    if (q.type === 'choice') {
      var btns = app.querySelectorAll('.option-btn');
      for (var j = 0; j < btns.length; j++) {
        btns[j].addEventListener('click', function() {
          state.answers[q.key] = this.getAttribute('data-value');
          advanceQuestion();
        });
      }
    } else if (q.type === 'scale') {
      var sbtns = app.querySelectorAll('.scale-btn');
      for (var k = 0; k < sbtns.length; k++) {
        sbtns[k].addEventListener('click', function() {
          state.answers[q.key] = parseInt(this.getAttribute('data-value'), 10);
          advanceQuestion();
        });
      }
    }
  }

  function advanceQuestion() {
    if (state.qIndex < totalQ() - 1) {
      state.qIndex++;
      transition(renderQuestion);
    } else {
      transition(renderLeadCapture);
    }
  }

  /* ═══════════════════════════════════════════════════════════════════
     RENDER: LEAD CAPTURE
     ═══════════════════════════════════════════════════════════════════ */
  function renderLeadCapture() {
    state.screen = 'lead-capture';
    var h = '';

    h += '<button class="back-btn" id="back">' + backArrow + ' Back</button>';
    h += '<p class="form-title">Almost done</p>';
    h += '<p class="form-subtitle">Enter your info below so we can send you a copy of your results.</p>';

    h += '<div class="form-group">';
    h += '<label class="form-label" for="f-name">First name</label>';
    h += '<input class="form-input" id="f-name" type="text" autocomplete="given-name" value="' + esc(state.lead.firstName) + '">';
    h += '<div class="form-error" id="err-name">Please enter your first name.</div>';
    h += '</div>';

    h += '<div class="form-group">';
    h += '<label class="form-label" for="f-email">Email</label>';
    h += '<input class="form-input" id="f-email" type="email" autocomplete="email" value="' + esc(state.lead.email) + '">';
    h += '<div class="form-error" id="err-email">Please enter a valid email address.</div>';
    h += '</div>';

    h += '<div class="form-group">';
    h += '<label class="form-label" for="f-mobile">Mobile number</label>';
    h += '<input class="form-input" id="f-mobile" type="tel" autocomplete="tel" placeholder="(555) 555-5555" value="' + esc(state.lead.mobile) + '">';
    h += '<div class="form-error" id="err-mobile">Please enter a 10-digit mobile number.</div>';
    h += '</div>';

    h += '<div class="consent-row">';
    h += '<input type="checkbox" id="f-consent"' + (state.consent ? ' checked' : '') + '>';
    h += '<label for="f-consent">I understand this quiz is for education only and is not medical advice.</label>';
    h += '</div>';
    h += '<div class="form-error" id="err-consent" style="margin-top:-16px;margin-bottom:16px">Please check the box above to continue.</div>';

    h += '<button class="btn-primary" id="submit-lead">See My Results</button>';

    app.innerHTML = h;

    // Phone formatting
    var mobileEl = document.getElementById('f-mobile');
    function handlePhoneInput() {
      var pos = this.selectionStart;
      var old = this.value;
      this.value = formatPhone(this.value);
      if (this.value.length > old.length) pos++;
      try { this.setSelectionRange(pos, pos); } catch(e) {}
    }
    mobileEl.addEventListener('input', handlePhoneInput);
    mobileEl.addEventListener('change', handlePhoneInput);

    // Back
    document.getElementById('back').addEventListener('click', function() {
      captureLead();
      state.qIndex = totalQ() - 1;
      transition(renderQuestion);
    });

    // Submit
    document.getElementById('submit-lead').addEventListener('click', function() {
      captureLead();
      var valid = true;

      if (!state.lead.firstName.trim()) {
        document.getElementById('f-name').classList.add('error');
        document.getElementById('err-name').classList.add('show');
        valid = false;
      }
      if (!validEmail(state.lead.email)) {
        document.getElementById('f-email').classList.add('error');
        document.getElementById('err-email').classList.add('show');
        valid = false;
      }
      if (phoneDigits(state.lead.mobile).length !== 10) {
        document.getElementById('f-mobile').classList.add('error');
        document.getElementById('err-mobile').classList.add('show');
        valid = false;
      }
      if (!state.consent) {
        document.getElementById('err-consent').classList.add('show');
        valid = false;
      }
      if (!valid) return;

      submitLead({
        path: state.path,
        pathChoice: state.pathChoice,
        answers: state.answers,
        lead: state.lead
      });

      transition(renderResults);
    });

    // Clear errors on input
    var inputs = app.querySelectorAll('.form-input');
    for (var i = 0; i < inputs.length; i++) {
      inputs[i].addEventListener('focus', function() {
        this.classList.remove('error');
        var errEl = this.parentNode.querySelector('.form-error');
        if (errEl) errEl.classList.remove('show');
      });
    }
    document.getElementById('f-consent').addEventListener('change', function() {
      document.getElementById('err-consent').classList.remove('show');
    });
  }

  function captureLead() {
    state.lead.firstName = (document.getElementById('f-name').value || '').trim();
    state.lead.email = (document.getElementById('f-email').value || '').trim();
    state.lead.mobile = document.getElementById('f-mobile').value || '';
    state.consent = document.getElementById('f-consent').checked;
  }

  /* ═══════════════════════════════════════════════════════════════════
     RENDER: RESULTS
     ═══════════════════════════════════════════════════════════════════ */
  function renderResults() {
    state.screen = 'results';
    var a = state.answers;
    var name = esc(state.lead.firstName);
    var bookingUrl = QUIZ.urls.assessmentBooking
      + '?firstName=' + encodeURIComponent(state.lead.firstName)
      + '&email=' + encodeURIComponent(state.lead.email)
      + '&phone=' + encodeURIComponent(phoneDigits(state.lead.mobile));
    var h = '';

    if (state.path === 'energy') {
      var mainIssue = getResultLabel('main_issue', a.main_issue);
      var duration = getResultLabel('duration', a.duration);
      var eScore = a.energy_score;
      var uScore = a.urgency_score;

      h += '<div class="results-badge">Your Results</div>';
      h += '<h2 class="results-title">You are an Energy &amp; Optimization case.</h2>';

      h += '<p class="results-text">' + name + ', from what you shared, your biggest struggle right now is '
        + esc(mainIssue) + ' and it has been going on for ' + esc(duration)
        + '. You rated your daily energy at ' + eScore
        + ' out of 10, which tells us this is starting to impact your days.</p>';

      h += '<p class="results-text">Many people we see have been told their basic labs are “fine,” '
        + 'but they still feel tired, foggy, or not like themselves. At Range Medical, we match how you feel '
        + 'with more detailed labs, then build a simple step‑by‑step plan instead of guessing.</p>';

      h += '<p class="results-text">The next step in our process is a Range Assessment ($197). In one visit, '
        + 'we review focused labs and your symptoms together and give you a written plan you can follow. '
        + 'Your $197 applies as a credit toward any labs or treatment plan, so it is not an extra cost on top.</p>';

      h += '<p class="results-text"><strong>Tip:</strong> Come fasted (no food for 12 hours, water is fine). '
        + 'If your provider recommends labs, we can draw blood during the same visit so you do not need a second trip.</p>';

      h += '<div class="urgency-box">We reserve a limited number of Range Assessment spots each week '
        + 'so we can spend real time with each person. Since you rated fixing this as ' + aOrAn(uScore) + ' ' + uScore
        + ' out of 10, it makes sense to grab a time while this is fresh in your mind.</div>';

      h += '<div class="cta-section">';
      h += '<a class="cta-link" href="' + bookingUrl + '">Step 1: Schedule Your Range Assessment — $197</a>';
      h += '<p class="cta-secondary">Not ready to book right now? We&#39;ll email your quiz answers so you can review them later.</p>';
      h += '</div>';

      if (state.pathChoice === 'both') {
        h += '<div class="both-note">You also mentioned dealing with an injury or pain. During your Range Assessment, '
          + 'we can discuss your recovery goals and whether one of our Recovery Programs is a good fit alongside your optimization plan.</div>';
      }

    } else {
      var bodyArea = getResultLabel('body_area', a.body_area);
      var chronicity = getResultLabel('chronicity', a.chronicity);
      var recovery = getResultLabel('recovery_feeling', a.recovery_feeling);
      var uScore2 = a.urgency_score;
      var isRangeST = a.current_provider === 'range_st';

      h += '<div class="results-badge">Your Results</div>';
      h += '<h2 class="results-title">You are an Injury &amp; Recovery case.</h2>';

      h += '<p class="results-text">' + name + ', you told us your main pain is in your '
        + esc(bodyArea) + ' and it has been going on for ' + esc(chronicity)
        + '. That kind of pain can wear you down over time, especially when it makes simple movements harder.</p>';

      h += '<p class="results-text">Many patients feel like their recovery is ' + esc(recovery)
        + ' and wish things would calm down faster. In our clinic, people often get the best results '
        + 'when they pair hands‑on care with recovery support tools like red light therapy, oxygen, peptide therapy, and targeted '
        + 'treatments to help tissues heal and settle.</p>';

      h += '<p class="results-text">The next step is a Range Assessment ($197) with our team. '
        + 'We listen to what has been tried so far, look at your goals, and map out a recovery plan tailored to you. '
        + 'Your $197 applies as a credit toward any labs or treatment plan, so it is not an extra cost on top.</p>';

      h += '<p class="results-text"><strong>Tip:</strong> Come fasted (no food for 12 hours, water is fine). '
        + 'If your provider recommends labs, we can draw blood during the same visit so you do not need a second trip.</p>';

      h += '<div class="urgency-box">You rated speeding this up as ' + aOrAn(uScore2) + ' ' + uScore2
        + ' out of 10. The sooner we see you, the sooner we can map out a plan so this does not keep dragging on.</div>';

      h += '<div class="cta-section">';
      if (isRangeST) {
        h += '<div class="cta-link" style="cursor:default">Show this screen to your therapist and ask about a Range Assessment.</div>';
        h += '<div class="range-st-note">We&#39;re in the same building and work together often on recovery cases like yours.</div>';
      } else {
        h += '<a class="cta-link" href="' + bookingUrl + '">Step 1: Schedule Your Range Assessment — $197</a>';
      }
      h += '</div>';
    }

    h += '<button class="restart-link" id="restart">Start over</button>';

    app.innerHTML = h;

    document.getElementById('restart').addEventListener('click', function() {
      state = { screen: 'landing', path: null, pathChoice: null, qIndex: 0, answers: {}, lead: { firstName: '', email: '', mobile: '' }, consent: false };
      transition(renderLanding);
    });
  }

  /* ═══════════════════════════════════════════════════════════════════
     INIT
     ═══════════════════════════════════════════════════════════════════ */
  renderLanding();
  </script>
</body>
</html>
