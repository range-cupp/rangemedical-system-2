<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Labs Slide 01 — Cover</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { width:1080px; height:1080px; overflow:hidden; background:#0A0A0A; font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased; }
  .slide { width:1080px; height:1080px; position:relative; background:#0A0A0A; }
  .slide::before { content:''; position:absolute; inset:0; background-image:linear-gradient(rgba(255,255,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.03) 1px,transparent 1px); background-size:72px 72px; pointer-events:none; }

  .top-bar { position:absolute; top:72px; left:108px; right:108px; display:flex; justify-content:space-between; align-items:center; z-index:2; }
  .brand { font-size:20px; font-weight:700; letter-spacing:0.02em; color:rgba(255,255,255,0.5); }
  .slide-num { font-size:18px; font-weight:500; color:rgba(255,255,255,0.3); }

  .center { position:absolute; top:0; left:108px; right:108px; bottom:0; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; z-index:2; }
  .pill-label { display:flex; align-items:center; gap:16px; font-size:20px; font-weight:700; letter-spacing:0.22em; text-transform:uppercase; color:rgba(255,255,255,0.35); margin-bottom:40px; }
  .pill-label::before, .pill-label::after { content:''; display:block; width:32px; height:1px; background:rgba(255,255,255,0.25); }
  .headline { font-size:112px; font-weight:800; line-height:0.91; letter-spacing:-5px; color:#FFFFFF; margin-bottom:44px; }
  .rule { width:56px; height:1px; background:rgba(255,255,255,0.25); margin-bottom:32px; }
  .descriptor { font-size:34px; font-weight:400; line-height:1.5; color:rgba(255,255,255,0.42); margin-bottom:52px; }

  .tiers { display:flex; gap:14px; justify-content:center; }
  .tier { border:1px solid rgba(255,255,255,0.18); border-radius:3px; padding:16px 36px; }
  .tier-label { font-size:18px; font-weight:700; letter-spacing:0.2em; text-transform:uppercase; color:rgba(255,255,255,0.3); margin-bottom:6px; }
  .tier-price { font-size:46px; font-weight:800; letter-spacing:-1px; color:#FFFFFF; }
  .tier-name { font-size:18px; font-weight:500; letter-spacing:0.1em; text-transform:uppercase; color:rgba(255,255,255,0.35); margin-top:4px; }

  .bottom-bar { position:absolute; bottom:64px; left:108px; right:108px; display:flex; justify-content:center; border-top:1px solid rgba(255,255,255,0.08); padding-top:20px; z-index:2; }
  .swipe-cta { font-size:20px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:rgba(255,255,255,0.35); }
</style>
</head>
<body>
<div class="slide">
  <div class="top-bar">
    <span class="brand">@range_medical</span>
    <span class="slide-num">01 / 06</span>
  </div>
  <div class="center">
    <div class="pill-label">Lab Panels</div>
    <div class="headline">Know Your<br/>Numbers.</div>
    <div class="rule"></div>
    <p class="descriptor">Two panels. One purpose. Answers that actually<br/>change how you think about your health.</p>
    <div class="tiers">
      <div class="tier">
        <div class="tier-label">Essential</div>
        <div class="tier-price">$350</div>
        <div class="tier-name">Core Markers</div>
      </div>
      <div class="tier">
        <div class="tier-label">Elite</div>
        <div class="tier-price">$750</div>
        <div class="tier-name">Full Picture</div>
      </div>
    </div>
  </div>
  <div class="bottom-bar">
    <span class="swipe-cta">Swipe to see what&#8217;s included &#8594;</span>
  </div>
</div>
</body>
</html>
